<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>xeokit TreeViewPlugin Example</title>
    <style>
        html, body { margin: 0; height: 100%; overflow: hidden; font-family: 'Roboto', sans-serif; }
        
        #myCanvas { width: 100%; height: 100%; display: block; }
        
        /* NavCube */
        #myNavCubeCanvas {
            position: absolute;
            width: 250px;
            height: 250px;
            bottom: 50px;
            right: 10px;
            z-index: 200000;
        }
        
        /* TreeView */
        #treeViewContainer {
            pointer-events: all;
            height: calc(100% - 80px);
            overflow-y: scroll;
            overflow-x: hidden;
            position: absolute;
            background-color: rgba(255, 255, 255, 0.9);
            color: black;
            top: 80px;
            z-index: 200000;
            left: 0;
            padding: 10px;
            font-size: 14px;
            user-select: none;
            width: 350px;
            border-right: 1px solid #ddd;
        }
        
        #treeViewContainer ul {
            list-style: none;
            padding-left: 1.75em;
            margin: 0;
        }
        
        #treeViewContainer ul li {
            position: relative;
            padding: 3px 0;
            width: 100%;
        }
        
        #treeViewContainer ul li a {
            background-color: #eee;
            border-radius: 50%;
            color: #000;
            display: inline-block;
            height: 1.5em;
            width: 1.5em;
            left: -1.5em;
            position: absolute;
            text-align: center;
            text-decoration: none;
        }
        
        #treeViewContainer ul li a.plus { background-color: #ded; }
        #treeViewContainer ul li a.minus { background-color: #eee; }
        
        #treeViewContainer ul li span {
            display: inline-block;
            padding: 2px 4px;
            cursor: pointer;
        }
        
        #treeViewContainer ul li span:hover {
            background: #333;
            color: white;
        }
        
        #treeViewContainer .highlighted-node {
            border: 1px solid black;
            background: yellow;
            color: black;
        }
        
        #stats {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255,255,255,0.9);
            padding: 10px 15px;
            border-radius: 4px;
            z-index: 200001;
        }
    </style>
</head>
<body>

<div id="stats">
    <strong>xeokit TreeViewPlugin</strong><br>
    <span id="time">Loading...</span>
</div>

<canvas id="myCanvas"></canvas>
<canvas id="myNavCubeCanvas"></canvas>
<div id="treeViewContainer"></div>

<script type="module">
    import {Viewer, XKTLoaderPlugin, NavCubePlugin, TreeViewPlugin} from "https://xeokit.github.io/xeokit-sdk/dist/xeokit-sdk.min.es.js";

    // Create the viewer
    const viewer = new Viewer({
        canvasId: "myCanvas",
        transparent: true
    });

    // Configure camera
    const cameraControl = viewer.cameraControl;
    cameraControl.followPointer = true;
    cameraControl.doublePickFlyTo = true;
    
    viewer.cameraFlight.duration = 1.0;
    viewer.cameraFlight.fitFOV = 25;

    viewer.camera.eye = [-2.56, 8.38, 8.27];
    viewer.camera.look = [13.44, 3.31, -14.83];
    viewer.camera.up = [0.10, 0.98, -0.14];

    // Configure materials
    viewer.scene.xrayMaterial.fillAlpha = 0.1;
    viewer.scene.xrayMaterial.fillColor = [0, 0, 0];
    viewer.scene.xrayMaterial.edgeAlpha = 0.4;
    viewer.scene.xrayMaterial.edgeColor = [0, 0, 0];

    viewer.scene.highlightMaterial.fill = false;
    viewer.scene.highlightMaterial.fillAlpha = 0.3;
    viewer.scene.highlightMaterial.edgeColor = [1, 1, 0];

    // Create NavCube
    new NavCubePlugin(viewer, {
        canvasId: "myNavCubeCanvas",
        visible: true,
        size: 250,
        alignment: "bottomRight",
        bottomMargin: 100,
        rightMargin: 10
    });

    // Create TreeView with storeys hierarchy
    const treeView = new TreeViewPlugin(viewer, {
        containerElement: document.getElementById("treeViewContainer"),
        autoExpandDepth: 1,
        hierarchy: "storeys",
        sortNodes: true,
        sortableStoreysTypes: [
            "IfcWall", 
            "IfcWallStandardCase", 
            "IfcSlab", 
            "IfcFurniture", 
            "IfcFurnishingElement", 
            "IfcDoor", 
            "IfcRoof"
        ]
    });

    // Load model
    const xktLoader = new XKTLoaderPlugin(viewer);
    const t0 = performance.now();
    document.getElementById("time").innerHTML = "Loading model...";

    const sceneModel = xktLoader.load({
        id: "myModel",
        src: "https://xeokit.github.io/xeokit-sdk/assets/models/xkt/v8/ifc/Schependomlaan.ifc.xkt",
        edges: true,
        excludeUnclassifiedObjects: false
    });

    sceneModel.on("loaded", function () {
        const t1 = performance.now();
        document.getElementById("time").innerHTML = 
            "Model loaded in " + Math.floor(t1 - t0) / 1000.0 + " seconds<br>" +
            "Objects: " + sceneModel.numEntities;
    });

    // Mouse hover highlighting
    let lastEntity = null;

    viewer.scene.input.on("mousemove", function (coords) {
        const hit = viewer.scene.pick({
            canvasPos: coords
        });

        if (hit) {
            if (!lastEntity || hit.entity.id !== lastEntity.id) {
                if (lastEntity) {
                    lastEntity.highlighted = false;
                }
                lastEntity = hit.entity;
                hit.entity.highlighted = true;
            }
        } else {
            if (lastEntity) {
                lastEntity.highlighted = false;
                lastEntity = null;
            }
        }
    });

    // Expose treeView globally for debugging
    window.treeView = treeView;
    window.viewer = viewer;
</script>

</body>
</html>
