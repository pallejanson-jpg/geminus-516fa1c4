openapi: 3.0.1
info:
  title: AssetDB API
  version: '1.0'
servers:
  - url: https://apim-assetdb-dev.azure-api.net/asset
paths:
  /AddObject:
    post:
      tags:
        - BimService
      operationId: AddObject
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/bimObjectWithParent'
      responses:
        '200':
          description: Payload of BimObject
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/bimObject'
        '422':
          description: Payload of Array of ValidationFailure
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/validationFailure'
        '403':
          description: No description
        '400':
          description: No description
        '500':
          description: No description
  /AddObjectList:
    post:
      tags:
        - BimService
      operationId: AddObjectList
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/bimObjectWithParentsRequest'
      responses:
        '200':
          description: Payload of BimObjectWithParentsResponse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/bimObjectWithParentsResponse'
        '422':
          description: Payload of Array of ValidationFailure
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/validationFailure'
        '403':
          description: No description
        '400':
          description: No description
        '500':
          description: No description
  /EditObject:
    put:
      tags:
        - BimService
      operationId: EditObject
      parameters:
        - name: hasFileUpload
          in: query
          required: true
          schema:
            type: boolean
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/bimObject'
      responses:
        '200':
          description: Payload of BimObject
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/bimObject'
        '422':
          description: Payload of Array of ValidationFailure
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/validationFailure'
        '400':
          description: No description
        '500':
          description: No description
        '403':
          description: No description
        '404':
          description: No description
  /DeleteObject:
    delete:
      tags:
        - BimService
      operationId: DeleteObject
      parameters:
        - name: objectId
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '200':
          description: No description
        '400':
          description: No description
        '500':
          description: No description
        '403':
          description: No description
        '404':
