        - name: revisionId
          in: query
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BIMService.Entities.BimObject.EntityFramework.Models.PropertyMapping'
  
  
  /GetCategories:
    get:
      tags:
        - PropertyMappingService
      summary: GetCategories
      operationId: GetCategories
      parameters:
        - name: modelId
          in: query
          schema:
            $ref: '#/components/schemas/uuid'
        - name: revisionId
          in: query
          schema:
            $ref: '#/components/schemas/uuid'
        - name: type
          in: query
          description: Only 0 for now
          schema:
            type: integer
      responses:
        '200':
          description: "OK"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCategories'
  
  
  /GetFiltersAndSelectedCategories:
    get:
      tags:
        - PropertyMappingService
      summary: GetFiltersAndSelectedCategories
      operationId: GetFiltersAndSelectedCategories
      parameters:
        - name: modelId
          in: query
          schema:
            $ref: '#/components/schemas/uuid'
        - name: revisionId
          in: query
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
  
  /GetPropertiesByModelId:
    post:
      tags:
        - PropertyMappingService
      summary: GetPropertiesByModelId
      operationId: GetPropertiesByModelId
      requestBody:
        description: "{\n  \"modelId\": \"00000000-0000-0000-0000-000000000000\",\n   \"categories\": [\"00000000-0000-0000-0000-000000000000\"]\n}"
        content:
          application/json:
            schema:
              type: object
              properties:
                modelId:
                  $ref: '#/components/schemas/uuid'
            example:
              ModelId: modelId
      responses:
        '200':
          description: "{\n\"sortedProperties:[\n{\n\"Property\" : \"\",\n\"Category\" : \"\",\n\"DataType\" : 2\n}\n]\n}"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PropertiesByModelId'
  
  '/UpdatePropertyMapping/{id}':
    put:
      tags:
        - PropertyMappingService
      summary: UpdatePropertyMapping
      operationId: UpdatePropertyMapping
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: PropertyMappingWithIds Body
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PropertyMappingWithIds'
      responses:
        '200':
          description: "OK"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BIMService.Entities.BimObject.EntityFramework.Models.PropertyMapping'
  #####################################################################################
  ##
  ##

  /ValidateFile:
    post:
      summary: ValidateFile
      operationId: ValidateFile
      requestBody:
        description: ""
        content:
          application/json:
            schema:
              type: object
              properties:
                RevisionId:
                  $ref: '#/components/schemas/uuid'
                ModelId:
                  $ref: '#/components/schemas/uuid'
                FileId:
                  $ref: '#/components/schemas/uuid'
                FilePath:
                  type: string
                FileName:
                  type: string
                TenantName:
                  type: string
                ImportType:
                  enum:
                    - 0
                    - 1
                  type: integer
                  format: int32
                  default: 0
                  x-enum-varnames:
                    - PropertyValues
                    - Orphan
              required:
                - ModelId
                - FilePath
                - FileName
      responses:
        '200':
          description: OK
  /GetValidationResults:
    get:
      tags:
        - ValidationService
      summary: GetValidationResults
      operationId: GetValidationResults
      parameters:
        - name: revisionId
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
        - name: modelId
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/uuid'
        - name: ruleSet
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ValidationResult'
  /GetValidationResultSummary:
    get:
      tags:
        - ValidationService
      summary: GetValidationResultSummary
      operationId: GetValidationResultSummary
      parameters:
        - name: revisionId
          in: query
