    get:
      tags:
        - PropertyMappingService
      summary: FindPropertyMapping
      operationId: FindPropertyMapping
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: sourcepropertygroup
          in: query
          schema:
            type: string
        - name: sourceproperty
          in: query
          schema:
            type: string
      responses:
        '200':
          description: "OK"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BIMService.Entities.BimObject.EntityFramework.Models.PropertyMapping'
        '500':
          description: "Error"
  
  /GetAllPropertyMappings:
    get:
      tags:
        - PropertyMappingService
      summary: GetAllPropertyMappings
      operationId: GetAllPropertyMappings
      parameters:
        - name: modelId
          in: query
