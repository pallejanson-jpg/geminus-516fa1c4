            type: string
            format: uuid
        - name: fmguid
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Payload of Array of Model
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BimModel'
        '403':
          description: No description
        '400':
          description: No description
        '500':
          description: No description

    post:
      tags:
        - BimService
      operationId: GetAllRelatedModelsPost
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/getAllRelatedModelsPostRequest'
      responses:
        '200':
          description: Payload of Array of Model
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BimModel'
        '403':
          description: No description
        '400':
          description: No description
        '500':
          description: No description

  /GetAllModelRevisions:
    get:
      tags:
        - BimService
      operationId: GetAllModelRevisions
      responses:
        "200":
          description: Payload of GetAllModelRevisionsResponse
          content:
            application/json:
