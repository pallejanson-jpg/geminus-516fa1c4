        - BimService
      operationId: ExpireObject
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/expireObjectRequest'
      responses:
        '200':
          description: No description
        '400':
          description: No description
        '500':
          description: No description
  /GetAllRelatedModels:
    get:
      tags:
        - BimService
      operationId: GetAllRelatedModels
      parameters:
        - name: bimobjectid
          in: query
