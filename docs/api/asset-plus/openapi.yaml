          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/validationFailure'
        '200':
          description: No description
        '403':
          description: No description
        '400':
          description: No description
        '500':
          description: No description

  /UpdateModelFileId:
    post:
      tags:
        - BimService
      summary: UpdateModelFileId
      operationId: UpdateModelFileId
      requestBody:
        description: Changes to save
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BIMClasses.Models.APIPayload.UpdateModelWithLog'
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request
        '500':
          description: Fail
  
  ##############################################################################
  ##
  ##    

  /Files:
    get:
      tags:
        - FileService
      operationId: Files
      parameters:
        - name: active
          in: query
          required: true
          schema:
            type: boolean
      responses:
        '200':
          description: Payload of Array of FetchFileResponse
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/fetchFileResponse" 
        '400':
          description: No description
        '500':
          description: No description

  /SasToken:
    get:
      tags:
        - FileService
      summary: SasToken
      operationId: GetToken
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  sasToken:
                    type: string
                    description: The URL to the blob store, including the sas token
  
  #####################################################################################
  ##
  ##

  '/file/{file}':
    get:
      tags:
        - LogService
      summary: GetIFCFileLogs
      operationId: GetIFCFileLogs
      parameters:
        - name: file
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  #####################################################################################
  ##
  ##
  
  /ProcessIfc:
    post:
      tags:
        - IfcService
      summary: ProcessIfc
      operationId: ProcessIfc
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fileName:
                  type: string
                fileId:
                  $ref: '#/components/schemas/uuid'
                filePath:
                  type: string
                modelId:
                  $ref: '#/components/schemas/uuid'
                tenantName:
                  type: string
                revisionId:
                  type: string

      responses:
        '200':
          description: OK
  
  
  #####################################################################################
  ## Property Mapping Service
  ##        


  /AddCategoryMapping:
    post:
      tags:
        - PropertyMappingService
      summary: AddCategoryMapping
      operationId: AddCategoryMapping
      requestBody:
        description: "{\n  \"parentId\": \"00000000-0000-0000-0000-000000000000\",\n  \"type\": 0\n}"
        content:
          application/json:
            schema:
              type: object
              properties:
                parentId:
                  type: string
                type:
                  type: number
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  parentId:
                    type: string
                  type:
                    type: number
        '400':
          description: Json body is broken or parameters missing
  
  
  /AddFilterAndSelectedCategories:
    post:
      tags:
        - PropertyMappingService
      summary: AddFilterAndSelectedCategories
      operationId: AddFilterAndSelectedCategories
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FilterWithSelectedCategories'
      responses:
        '200':
          description: "{\n \"categoryFilterId\": \"00000000-0000-0000-0000-000000000000\"\n}"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/uuid'
        '500':
          description: 'Error inserting into database, error deleting categoriesselected from database'
        '400':
          description: Body is a broken JSON or parameters missing

  /AddPropertyMapping:
    post:
      tags:
        - PropertyMappingService
      summary: AddPropertyMapping
      operationId: AddPropertyMapping
      requestBody:
        description: Add a property mapping
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PropertyMappingWithIds'
      
      responses:
        '200':
          description: "{\n  \"propertyMappingId\": \"00000000-0000-0000-0000-000000000000\",\n  \"modelId\": \"00000000-0000-0000-0000-000000000000\",\n  \"revisionId\": \"00000000-0000-0000-0000-000000000000\",\n   \"propertyMapping\": {\n    \"category\": \"\",\n    \"sourcePropertyGroup\": \"\",\n    \"sourceProperty\": \"\",\n    \"destinationPropertyGroup\": \"\",\n    \"destinationProperty\": \"\",\n    \"destinationDataType\": 0,\n    \"rules\": null\n  }\n}"
          content:
            application/jston:
              schema:
                $ref: '#/components/schemas/PropertyMappingWithIds'
        '400':
          description: 'Parameters missing (revisionId, modelId)'
        '500':
          description: Exception on server when saving
  
  /ApplyPropertyMapping:
    post:
      tags:
        - PropertyMappingService
      summary: ApplyPropertyMapping
      operationId: ApplyPropertyMapping
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BIMClasses.Models.APIPayload.ApplyPropertyMapping'
      responses:
        '200':
          description: "OK"
        '500':
          description: "Error"

  /DeleteAllPropertyMappings:
    delete:
      tags:
        - PropertyMappingService
      summary: DeleteAllPropertyMappings
      operationId: DeleteAllPropertyMappings
      parameters:
        - name: modelId
          in: query
          schema:
            $ref: '#/components/schemas/uuid'
        - name: revisionId
          in: query
          schema:
            $ref: '#/components/schemas/uuid'
      responses:
        '200':
          description: ''
        '500':
          description: Error deleting from database

  /DeletePropertyMapping:
    delete:
      tags:
        - PropertyMappingService
      summary: DeletePropertyMapping
      operationId: DeletePropertyMapping
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BIMClasses.Models.APIPayload.PropertyMappingBaseRequest'
      responses:
        '200':
          description: "{\n  true/false\n}"
          content:
            application/json:
              schema:
                type: boolean
        '400':
          description: Parameters missing from body
        '500':
          description: Error operating on the database

