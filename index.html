    <meta charset="UTF-8" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- Asset+ 3D Viewer Styles -->
    <link rel="stylesheet" href="/lib/assetplus/assetplusviewer.css" />

    <meta property="og:title" content="My SWG" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@SWG" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      // Auto-recover from stale module chunk failures (Safari/iPhone cache issue)
      function _mrCheck(msg) {
        if (msg && msg.includes('Importing a module script failed') && !sessionStorage.getItem('_mr')) {
          sessionStorage.setItem('_mr', '1');
          window.location.reload();
        }
      }
      window.addEventListener('error', function(e) { _mrCheck(e.message); });
      window.addEventListener('unhandledrejection', function(e) {
        var m = e.reason && (e.reason.message || String(e.reason));
        _mrCheck(m);
      });
      window.addEventListener('load', function() { sessionStorage.removeItem('_mr'); });
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Asset+ 3D Viewer Library -->
    <script src="/lib/assetplus/assetplusviewer.umd.min.js"></script>
    <!-- Custom NavCube Plugin -->
    <script src="/lib/xeokit/NavCubePlugin.js"></script>
  </body>
</html>
